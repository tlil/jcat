name: Build Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            binary: jcat
          - target: linux-arm64
            goos: linux
            goarch: arm64
            binary: jcat
          - target: windows-amd64
            goos: windows
            goarch: amd64
            binary: jcat.exe
          - target: windows-arm64
            goos: windows
            goarch: arm64
            binary: jcat.exe
          - target: macos-amd64
            goos: darwin
            goarch: amd64
            binary: jcat
          - target: macos-arm64
            goos: darwin
            goarch: arm64
            binary: jcat

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "dist/${{ matrix.target }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.target }}/${{ matrix.binary }}" .

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: jcat-${{ matrix.target }}
          path: dist/${{ matrix.target }}/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for artifact_dir in artifacts/jcat-*; do
            target="${artifact_dir#artifacts/jcat-}"
            if [ -f "$artifact_dir/jcat.exe" ]; then
              cp "$artifact_dir/jcat.exe" "release-assets/jcat-$target.exe"
            else
              cp "$artifact_dir/jcat" "release-assets/jcat-$target"
            fi
          done

      - name: Create release notes
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="$(date -u +%Y-%m)-$short_sha"
          {
            printf 'Automated release for commit `%s`.\n\n' "$GITHUB_SHA"
            printf '## Commit details:\n\n'
            printf '%s\n\n' "$COMMIT_MESSAGE"
            printf '## Build artifacts:\n'
            for asset in release-assets/*; do
              asset_name="$(basename "$asset")"
              printf -- '- [`%s`](https://github.com/%s/releases/download/%s/%s)\n' "$asset_name" "$GITHUB_REPOSITORY" "$tag" "$asset_name"
            done
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_name="$(date -u +%Y-%m)-$short_sha"
          gh release create "$release_name" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes-file release-notes.md
